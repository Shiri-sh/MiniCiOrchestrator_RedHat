
<header style="background: #e9322e; color: white; padding: 1rem; margin-bottom: 2rem;">
    <h1 style="margin: 0;">Mini CI Orchestrator</h1>
    <small>Custom Build System for Red Hat Demo</small>
</header>

<body style="background: #f0eaea; justify-content: center; align-items: center; display: flex; flex-direction: column; gap: 1rem;">
    <input id="repo" placeholder="repo url" value="https://github.com/Shiri-sh/test-mini-ci">
    <input id="branch" placeholder="branch" value="main">

    <button id="buildButt" style="color: #e9322e;">Build</button>
     
    <div id="table"> 
        <table style="border-collapse: collapse; width: 500px;">
            <thead>
                <tr style="background: #e9322e; color: white; margin: 3rem;">
                    <th>Build_ID</th>
                    <th>Repo</th>
                    <th>Status</th>
                    <th>Created_At</th>
                </tr>
            </thead>
            <tbody id="buildsList"></tbody>
        </table>
    </div>
</body>
<script src="app.js"></script>
